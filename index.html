<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sát hạch Xe nâng CAEE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">
    <div id="start-screen" class="card shadow p-4 text-center mx-auto" style="max-width: 500px;">
        <h2 class="text-primary fw-bold">SÁT HẠCH XE NÂNG</h2>
        <p class="text-muted">Trường Cao Đẳng Cơ Điện Nông Nghiệp và Môi Trường</p>
        <div class="text-start mb-3">
            <label class="form-label fw-bold">Họ và tên:</label>
            <input type="text" id="studentName" class="form-control mb-2" placeholder="Nhập họ tên">
            <label class="form-label fw-bold">Mã số/Lớp:</label>
            <input type="text" id="studentID" class="form-control" placeholder="Nhập mã số">
        </div>
        <button class="btn btn-primary btn-lg w-100" onclick="startQuiz()">BẮT ĐẦU THI</button>
    </div>

    <div id="quiz-screen" style="display:none;">
        <div class="sticky-timer text-center mb-3" id="timer">Thời gian còn lại: 20:00</div>
        <div id="quiz-content"></div>
        <button class="btn btn-success btn-lg w-100 mb-5" onclick="submitQuiz()">NỘP BÀI THI</button>
    </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
